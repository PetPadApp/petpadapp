<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pet Pad Adoption - Find Your New Best Friend</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

        :root {
            --primary-color: #40E0D0;
            --secondary-color: #D4A76A;
            --accent-color: #FF69B4;
            --text-color: #E8E8E8;
            --light-bg: #1A1A1A;
            --card-bg: #2A2A2A;
            --border-color: #404040;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
            color: var(--text-color);
            margin: 0;
            padding: 0;
            background-color: #000000;
        }

        /* Header */
        .site-header {
            background: var(--light-bg);
            border-bottom: 1px solid var(--border-color);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .site-header .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: var(--primary-color);
            font-weight: 700;
            font-size: 1.2em;
        }
        .site-header .logo img {
            height: 36px;
        }
        .site-header nav a {
            color: var(--text-color);
            text-decoration: none;
            margin-left: 18px;
            font-size: 0.95em;
            transition: color 0.2s;
        }
        .site-header nav a:hover { color: var(--primary-color); }

        /* Hero */
        .hero {
            text-align: center;
            padding: 30px 20px 10px;
        }
        .hero h1 {
            color: var(--primary-color);
            margin: 0 0 8px;
            font-weight: 700;
            font-size: 1.9em;
        }
        .hero p {
            color: #aaa;
            margin: 0;
            font-size: 0.95em;
        }

        /* Layout */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px 40px;
        }
        .layout {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }

        /* Map */
        #map {
            flex: 1 1 60%;
            min-height: 500px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            background: #111;
        }
        .leaflet-popup-content-wrapper {
            background: var(--card-bg);
            color: var(--text-color);
            border-radius: 10px;
            border: 1px solid var(--border-color);
        }
        .leaflet-popup-tip {
            background: var(--card-bg);
        }
        .leaflet-container a { color: var(--primary-color); }

        /* Sidebar */
        .sidebar {
            flex: 1 1 35%;
            display: flex;
            flex-direction: column;
            gap: 14px;
            max-height: 500px;
            overflow-y: auto;
        }
        .sidebar::-webkit-scrollbar { width: 6px; }
        .sidebar::-webkit-scrollbar-track { background: transparent; }
        .sidebar::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 3px; }

        /* Pet Card */
        .pet-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 14px;
            display: flex;
            gap: 14px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
        }
        .pet-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(64, 224, 208, 0.15);
            border-color: var(--primary-color);
        }
        .pet-card.active {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 2px rgba(64, 224, 208, 0.25);
        }
        .pet-card .pet-img {
            width: 80px;
            height: 80px;
            border-radius: 10px;
            object-fit: cover;
            background: #333;
            flex-shrink: 0;
        }
        .pet-card .pet-info { flex: 1; min-width: 0; }
        .pet-card .pet-name {
            font-weight: 600;
            color: var(--primary-color);
            margin: 0 0 4px;
            font-size: 1.05em;
        }
        .pet-card .pet-meta {
            font-size: 0.85em;
            color: #aaa;
            margin: 0 0 6px;
        }
        .pet-card .pet-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .pet-card .tag {
            background: rgba(64, 224, 208, 0.15);
            color: var(--primary-color);
            font-size: 0.75em;
            padding: 3px 10px;
            border-radius: 20px;
            font-weight: 500;
        }
        .pet-card .tag.secondary {
            background: rgba(212, 167, 106, 0.15);
            color: var(--secondary-color);
        }

        /* Detail Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            padding: 20px;
        }
        .modal-overlay.open { display: flex; }
        .modal {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            max-width: 500px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            position: relative;
        }
        .modal .modal-img {
            width: 100%;
            height: 240px;
            object-fit: cover;
            border-radius: 16px 16px 0 0;
            background: #333;
        }
        .modal .modal-body { padding: 22px; }
        .modal .modal-close {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(0,0,0,0.6);
            border: none;
            color: #fff;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            font-size: 1.2em;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal h2 {
            color: var(--primary-color);
            margin: 0 0 6px;
            font-size: 1.4em;
        }
        .modal .modal-meta {
            color: #aaa;
            font-size: 0.9em;
            margin-bottom: 14px;
        }
        .modal .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.9em;
        }
        .modal .detail-row:last-child { border-bottom: none; }
        .modal .detail-label { color: #888; }
        .modal .detail-value { color: var(--text-color); font-weight: 500; }
        .modal .shelter-box {
            background: var(--light-bg);
            border-radius: 10px;
            padding: 14px;
            margin-top: 16px;
        }
        .modal .shelter-box h4 {
            margin: 0 0 6px;
            color: var(--secondary-color);
            font-size: 0.95em;
        }
        .modal .shelter-box p {
            margin: 0;
            font-size: 0.85em;
            color: #aaa;
        }
        .modal .cta {
            margin-top: 18px;
            display: flex;
            gap: 10px;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background-color: var(--primary-color);
            color: #000;
            padding: 12px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95em;
            border: none;
            cursor: pointer;
            flex: 1;
            transition: all 0.2s;
        }
        .btn:hover {
            background-color: #20B2AA;
            transform: translateY(-1px);
        }
        .btn.secondary {
            background: transparent;
            color: var(--primary-color);
            border: 1px solid var(--primary-color);
        }
        .btn.secondary:hover { background: rgba(64,224,208,0.1); }

        /* Loading / Empty */
        .loading, .empty {
            text-align: center;
            padding: 40px 20px;
            color: #888;
        }
        .loading i { font-size: 2em; color: var(--primary-color); animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Footer */
        .footer {
            text-align: center;
            padding: 30px 20px;
            color: #666;
            font-size: 0.85em;
            border-top: 1px solid var(--border-color);
            margin-top: 20px;
        }
        .footer a { color: var(--primary-color); text-decoration: none; }

        /* Mobile */
        @media (max-width: 900px) {
            .layout { flex-direction: column; }
            #map { min-height: 350px; }
            .sidebar { max-height: none; }
        }
        @media (max-width: 600px) {
            .site-header .logo span { display: none; }
            .hero h1 { font-size: 1.5em; }
            .pet-card { gap: 10px; padding: 10px; }
            .pet-card .pet-img { width: 60px; height: 60px; }
        }
    </style>
</head>
<body>
    <header class="site-header">
        <a href="/" class="logo">
            <img src="/PetPadLogoTextGreen.png" alt="Pet Pad">
            <span>Pet Pad</span>
        </a>
        <nav>
            <a href="/">Home</a>
            <a href="/adoption/">Adopt a Pet</a>
        </nav>
    </header>

    <div class="hero">
        <h1>Adopt a Pet</h1>
        <p>Browse adoptable pets from shelters and fosters near you</p>
    </div>

    <div class="container">
        <div class="layout">
            <div id="map"></div>
            <div class="sidebar" id="sidebar">
                <div class="loading"><i class="fas fa-spinner"></i><p>Loading pets...</p></div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
        <div class="modal" id="modal" onclick="event.stopPropagation()">
            <button class="modal-close" onclick="closeModal()">&times;</button>
            <img id="modalImg" class="modal-img" src="" alt="">
            <div class="modal-body">
                <h2 id="modalName"></h2>
                <div class="modal-meta" id="modalMeta"></div>
                <div id="modalDetails"></div>
                <div class="shelter-box">
                    <h4><i class="fas fa-home"></i> Shelter / Foster</h4>
                    <p id="modalShelter"></p>
                </div>
                <div class="cta">
                    <a id="modalAppLink" href="https://apps.apple.com/app/id6749177166" class="btn" target="_blank">
                        <i class="fab fa-apple"></i> Open in Pet Pad
                    </a>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer">
        <p>Data provided by shelters using <a href="/">Pet Pad</a>. Adopt responsibly.</p>
        <p style="margin-top:8px;">&copy; <span id="year"></span> Pet Pad. All rights reserved.</p>
    </footer>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
        import { getFirestore, collection, query, where, getDocs } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

        const firebaseConfig = {
            apiKey: "AIzaSyAIUlJCdgy4AtZLIGBihdlnZP4NnqxNghQ",
            authDomain: "mypet-b1143.firebaseapp.com",
            projectId: "mypet-b1143",
            storageBucket: "mypet-b1143.firebasestorage.app",
            messagingSenderId: "554504547921",
            appId: "1:554504547921:web:2214121c31a7d03f785270"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const map = L.map('map').setView([39.8283, -98.5795], 4); // US center
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        const markers = [];
        const pets = [];
        let activeCard = null;

        function getAge(dob) {
            if (!dob) return null;
            const birth = new Date(dob);
            const now = new Date();
            let years = now.getFullYear() - birth.getFullYear();
            const m = now.getMonth() - birth.getMonth();
            if (m < 0 || (m === 0 && now.getDate() < birth.getDate())) years--;
            if (years < 1) {
                const months = (now.getFullYear() - birth.getFullYear()) * 12 + (now.getMonth() - birth.getMonth());
                return months <= 0 ? 'Unknown' : `${months} mo`;
            }
            return `${years} yr`;
        }

        function createPopupContent(pet) {
            const img = pet.imageUrl ? `<img src="${pet.imageUrl}" style="width:100%;height:120px;object-fit:cover;border-radius:8px;margin-bottom:8px;">` : '';
            return `
                ${img}
                <div style="font-weight:600;color:#40E0D0;margin-bottom:4px;">${pet.name}</div>
                <div style="font-size:0.85em;color:#ccc;">${pet.breed || 'Mixed'} &bull; ${pet.sex || ''}</div>
                <div style="margin-top:6px;text-align:center;"><a href="#" onclick="window.showPetDetail('${pet.id}');return false;" style="color:#40E0D0;font-size:0.85em;font-weight:500;">View Details</a></div>
            `;
        }

        function renderSidebar() {
            const sidebar = document.getElementById('sidebar');
            if (pets.length === 0) {
                sidebar.innerHTML = '<div class="empty"><i class="fas fa-paw" style="font-size:2em;color:#555;margin-bottom:10px;"></i><p>No adoptable pets listed yet.<br>Check back soon!</p></div>';
                return;
            }
            sidebar.innerHTML = pets.map((pet, idx) => `
                <div class="pet-card" data-idx="${idx}" onclick="window.focusPet(${idx})">
                    <img class="pet-img" src="${pet.imageUrl || '/petPadNotebookDarkGreyTan.png'}" alt="${pet.name}" onerror="this.src='/petPadNotebookDarkGreyTan.png'">
                    <div class="pet-info">
                        <div class="pet-name">${pet.name}</div>
                        <div class="pet-meta">${pet.breed || 'Mixed'} &bull; ${pet.sex || ''} &bull; ${getAge(pet.dateOfBirth) || 'Age unknown'}</div>
                        <div class="pet-tags">
                            ${pet.petType ? `<span class="tag">${pet.petType}</span>` : ''}
                            ${pet.shelterLocation ? `<span class="tag secondary"><i class="fas fa-map-marker-alt" style="font-size:0.75em;"></i> ${pet.shelterLocation.split(',')[0]}</span>` : ''}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        async function loadPets() {
            try {
                const q = query(collection(db, 'adoptablePets'), where('isAdoptable', '==', true));
                const snapshot = await getDocs(q);
                snapshot.forEach(doc => {
                    const data = doc.data();
                    data.id = doc.id;
                    pets.push(data);
                });

                // Sort by most recently listed
                pets.sort((a, b) => {
                    const aDate = a.adoptableSince ? new Date(a.adoptableSince) : new Date(0);
                    const bDate = b.adoptableSince ? new Date(b.adoptableSince) : new Date(0);
                    return bDate - aDate;
                });

                // Use real shelterLat/Lng when available, otherwise fallback to hash-based scatter
                const bounds = L.latLngBounds();
                pets.forEach((pet, i) => {
                    let lat, lng;
                    if (typeof pet.shelterLat === 'number' && typeof pet.shelterLng === 'number') {
                        lat = pet.shelterLat;
                        lng = pet.shelterLng;
                    } else {
                        // Fallback: pseudo-random but stable lat/lng based on doc id
                        const hash = pet.id.split('').reduce((a, b) => a + b.charCodeAt(0), 0);
                        lat = 30 + (hash % 1500) / 100; // ~30-45N
                        lng = -120 + (hash % 4000) / 100; // ~-120 to -80
                    }
                    pet._lat = lat;
                    pet._lng = lng;

                    const marker = L.marker([lat, lng]).addTo(map);
                    marker.bindPopup(createPopupContent(pet));
                    markers.push(marker);
                    bounds.extend([lat, lng]);
                });

                if (pets.length > 0) {
                    map.fitBounds(bounds, { padding: [40, 40], maxZoom: 10 });
                }

                renderSidebar();
            } catch (e) {
                console.error('Error loading pets:', e);
                document.getElementById('sidebar').innerHTML = '<div class="empty"><p>Unable to load pets. Please try again later.</p></div>';
            }
        }

        window.focusPet = (idx) => {
            const pet = pets[idx];
            if (!pet) return;
            map.setView([pet._lat, pet._lng], 12);
            markers[idx]?.openPopup();
            document.querySelectorAll('.pet-card').forEach(c => c.classList.remove('active'));
            const card = document.querySelector(`.pet-card[data-idx="${idx}"]`);
            if (card) {
                card.classList.add('active');
                card.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        };

        window.showPetDetail = (id) => {
            const pet = pets.find(p => p.id === id);
            if (!pet) return;
            document.getElementById('modalImg').src = pet.imageUrl || '/petPadNotebookDarkGreyTan.png';
            document.getElementById('modalName').textContent = pet.name;
            document.getElementById('modalMeta').textContent = `${pet.breed || 'Mixed'} • ${pet.sex || ''} • ${getAge(pet.dateOfBirth) || 'Age unknown'}`;

            const details = [
                ['Color', pet.color],
                ['Weight', pet.weight],
                ['Microchip', pet.microchipNumber],
                ['Spayed/Neutered', pet.spayedNeuteredStatus],
                ['Allergies', pet.allergies],
                ['Medications', pet.medications],
                ['Medical Info', pet.medicalInfo],
            ].filter(([_, v]) => v);

            document.getElementById('modalDetails').innerHTML = details.map(([label, value]) => `
                <div class="detail-row"><span class="detail-label">${label}</span><span class="detail-value">${value}</span></div>
            `).join('') || '<div class="detail-row"><span class="detail-label">Info</span><span class="detail-value">Contact shelter for details</span></div>';

            document.getElementById('modalShelter').innerHTML = `
                <strong>${pet.shelterName || 'Unknown Shelter'}</strong><br>
                ${pet.shelterLocation || 'Location not provided'}<br>
                <span style="color:#666;">Listed ${pet.adoptableSince ? new Date(pet.adoptableSince).toLocaleDateString() : 'recently'}</span>
            `;

            document.getElementById('modalOverlay').classList.add('open');
            document.body.style.overflow = 'hidden';
        };

        window.closeModal = (e) => {
            if (e && e.target !== document.getElementById('modalOverlay')) return;
            document.getElementById('modalOverlay').classList.remove('open');
            document.body.style.overflow = '';
        };

        document.addEventListener('keydown', e => { if (e.key === 'Escape') window.closeModal(); });
        document.getElementById('year').textContent = new Date().getFullYear();

        loadPets();
    </script>
</body>
</html>
